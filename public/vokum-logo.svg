<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldFrame" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5e6c0"/>
      <stop offset="40%" stop-color="#e8c97e"/>
      <stop offset="70%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6c28"/>
    </linearGradient>
    <linearGradient id="goldV" x1="13" y1="12" x2="27" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5e6c0"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6c28"/>
    </linearGradient>
    <linearGradient id="goldDot" x1="0" y1="0" x2="1" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8c97e"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Outer octagonal frame — cut corners at 45° -->
  <path
    d="M5 13 L5 27 L13 35 L27 35 L35 27 L35 13 L27 5 L13 5 Z"
    fill="none"
    stroke="url(#goldFrame)"
    stroke-width="1"
    stroke-linejoin="round"
  />

  <!-- Inner subtle frame inset -->
  <path
    d="M7.5 14.2 L7.5 25.8 L14.2 32.5 L25.8 32.5 L32.5 25.8 L32.5 14.2 L25.8 7.5 L14.2 7.5 Z"
    fill="none"
    stroke="url(#goldFrame)"
    stroke-width="0.3"
    stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- V lettermark — clean geometric -->
  <path
    d="M13 12.5 L20 27.5 L27 12.5"
    fill="none"
    stroke="url(#goldV)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Corner accent dots -->
  <circle cx="13" cy="5" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="27" cy="5" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="35" cy="13" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="35" cy="27" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="27" cy="35" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="13" cy="35" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="5" cy="27" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
  <circle cx="5" cy="13" r="1.2" fill="url(#goldDot)" opacity="0.9"/>
</svg>
